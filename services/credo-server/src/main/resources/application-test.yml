spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:credo}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

wechat:
  mini-app-id: ${WECHAT_MINI_APP_ID:wxbda744f66076ee8e}
  mini-app-secret: ${WECHAT_MINI_APP_SECRET:test-secret}

jwt:
  secret: ${JWT_SECRET:test-jwt-secret-key-at-least-32-chars}

logging:
  level:
    root: info
    com.credo: debug
